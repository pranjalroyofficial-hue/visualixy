<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Feed - VISUALIXY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-200 font-sans">

    <div class="p-4 bg-slate-900/60 border-b border-slate-800 flex items-center justify-between sticky top-0 backdrop-blur-md z-40">
        <a href="index.html" class="text-yellow-500 font-bold flex items-center gap-1 text-sm"><i class="fa fa-arrow-left"></i> Back</a>
        <span class="font-bold text-xs tracking-wider uppercase text-slate-400">Universe Catalog Meta</span>
        <div></div>
    </div>

    <div class="max-w-2xl mx-auto p-4 mt-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5 flex flex-col sm:flex-row gap-6 items-center shadow-xl">
            <img id="novelCover" src="https://via.placeholder.com/150" class="w-28 h-40 object-cover rounded-2xl border border-slate-800 shadow-md">
            <div class="flex-1 text-center sm:text-left">
                <h2 id="novelTitle" class="text-xl font-black text-yellow-500">Loading Title...</h2>
                <p id="novelGenre" class="text-xs text-slate-500 mt-1">Genre: Processing...</p>
                <p id="novelSynopsis" class="text-xs text-slate-400 mt-3 leading-relaxed"></p>
            </div>
        </div>

        <div class="mt-8 mb-24">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 border-l-2 border-yellow-500 pl-2">Seasons & Episodes Index</h3>
            <div class="space-y-3" id="episodesListContainer"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const novelId = urlParams.get('id');

        if(novelId) {
            loadNovelMetadata();
        }

        async function loadNovelMetadata() {
            const { data: novel } = await supabase.from('novels').select('*').eq('id', novelId).single();
            if(novel) {
                document.getElementById('novelTitle').innerText = novel.title;
                document.getElementById('novelGenre').innerText = `Genre: ${novel.genre}`;
                document.getElementById('novelSynopsis').innerText = novel.synopsis;
                document.getElementById('novelCover').src = novel.cover_url;
                loadSeasonsAndEpisodes();
            }
        }

        async function loadSeasonsAndEpisodes() {
            const { data: episodes } = await supabase.from('episodes').select('episode_number, season_number, title, status').eq('novel_id', novelId).order('season_number', { ascending: true }).order('episode_number', { ascending: true });
            const container = document.getElementById('episodesListContainer');
            container.innerHTML = "";

            if(!episodes || episodes.length === 0) {
                container.innerHTML = `<div class="text-xs text-slate-600">Chapters compiling...</div>`; return;
            }

            const seasonsMap = {};
            episodes.forEach(ep => {
                if(!seasonsMap[ep.season_number]) seasonsMap[ep.season_number] = [];
                seasonsMap[ep.season_number].push(ep);
            });

            Object.keys(seasonsMap).forEach(seasonNum => {
                let epRows = seasonsMap[seasonNum].map(ep => `
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex justify-between items-center">
                        <div>
                            <h4 class="text-xs font-bold text-slate-200">Ep ${ep.episode_number}: ${ep.title}</h4>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="triggerMonetizedGate(${ep.episode_number}, 'read', '${ep.status}')" class="bg-yellow-500 text-slate-950 font-black px-3 py-1 rounded-lg text-[10px] uppercase tracking-wide">Read ${ep.status === 'premium' ? '(3 Ads)' : ''}</button>
                            <button onclick="triggerMonetizedGate(${ep.episode_number}, 'audio', '${ep.status}')" class="bg-purple-600 text-white font-black px-3 py-1 rounded-lg text-[10px] uppercase tracking-wide">Audio ${ep.status === 'premium' ? '(2 Ads)' : ''}</button>
                        </div>
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="mb-4">
                        <div class="text-xs font-black text-yellow-500 bg-slate-900/60 border border-slate-800/60 px-4 py-2.5 rounded-xl mb-2">🎬 SEASON ${seasonNum}</div>
                        <div class="space-y-2 pl-1">${epRows}</div>
                    </div>
                `;
            });
        }

        function triggerMonetizedGate(epNum, mode, status) {
            if(status === 'premium') {
                const ads = mode === 'read' ? 3 : 2;
                alert(`⚠️ Interstitial Ad Block: Streaming ${ads} video ads sequence before unlocking chapter resources...`);
                setTimeout(() => { proceedToStory(epNum, mode); }, 1000);
            } else {
                proceedToStory(epNum, mode);
            }
        }

        function proceedToStory(epNum, mode) {
            window.location.href = `read.html?id=${novelId}&ep=${epNum}&mode=${mode}`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Terminal Stream - VISUALIXY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-200 font-sans">

    <div class="sticky top-0 bg-slate-900 p-3 border-b border-slate-800 flex justify-between items-center shadow-md z-50">
        <button onclick="history.back()" class="text-yellow-500 font-bold text-xs">← Back</button>
        <select id="langSelect" class="bg-slate-800 text-white text-xs p-1.5 rounded-md border border-slate-700 outline-none">
            <option value="original">🌐 Original (English)</option>
            <option value="hindi">Hindi (हिंदी)</option>
        </select>
    </div>

    <div class="max-w-xl mx-auto mt-4 px-4">
        <div class="bg-gradient-to-r from-purple-950 to-slate-900 p-4 rounded-2xl border border-purple-900/40 shadow-xl flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center font-black text-slate-950 text-xs">AI</div>
                <div>
                    <h4 class="font-bold text-xs text-purple-400">Audio Series Engine</h4>
                    <p class="text-[10px] text-slate-500">Spatial Text-to-Speech Core</p>
                </div>
            </div>
            <button id="audioBtn" class="bg-yellow-500 text-slate-950 font-black px-4 py-2 rounded-full text-xs uppercase tracking-wider flex items-center gap-1">▶ Listen</button>
        </div>
    </div>

    <div class="max-w-xl mx-auto px-4 py-8 text-md leading-loose tracking-wide min-h-screen">
        <h2 id="chapterTitle" class="text-xl font-black text-yellow-500 mb-6 text-center">Loading Chapter...</h2>
        <div id="novelText" class="space-y-4 text-slate-300 text-sm"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const novelId = urlParams.get('id');
        const epNum = parseInt(urlParams.get('ep'));
        const launchMode = urlParams.get('mode');

        let epDataBlock = null;
        let isPlaying = false;
        let speech = new SpeechSynthesisUtterance();

        async function fetchChapterData() {
            const { data } = await supabase.from('episodes').select('*').eq('novel_id', novelId).eq('episode_number', epNum).single();
            if(data) {
                epDataBlock = data;
                document.getElementById('chapterTitle').innerText = data.title;
                renderTextContent('original');
                
                // Auto execution triggers if mode matches audio parameter structures
                if(launchMode === 'audio') {
                    triggerAudioAutoplayEngine();
                }
            }
        }
        fetchChapterData();

        function renderTextContent(lang) {
            const targetDiv = document.getElementById('novelText');
            if(lang === 'hindi' && epDataBlock.text_hindi) {
                targetDiv.innerText = epDataBlock.text_hindi;
            } else {
                targetDiv.innerText = epDataBlock.text_original;
            }
        }

        document.getElementById('langSelect').addEventListener('change', (e) => {
            renderTextContent(e.target.value);
            if(isPlaying) stopAudio();
        });

        function triggerAudioAutoplayEngine() {
            alert("🎙️ Audio Interstitial: Streaming 2 video ads before triggering continuous spatial voice player loop...");
            setTimeout(() => { toggleAudioPlayer(); }, 1200);
        }

        document.getElementById('audioBtn').addEventListener('click', () => { toggleAudioPlayer(); });

        function toggleAudioPlayer() {
            if(!isPlaying) {
                speech.text = document.getElementById('novelText').innerText;
                speech.lang = document.getElementById('langSelect').value === 'hindi' ? 'hi-IN' : 'en-US';
                window.speechSynthesis.speak(speech);
                document.getElementById('audioBtn').innerText = "🛑 Stop";
                isPlaying = true;
            } else { stopAudio(); }
        }

        function stopAudio() {
            window.speechSynthesis.cancel();
            document.getElementById('audioBtn').innerText = "▶ Listen";
            isPlaying = false;
        }

        window.onbeforeunload = () => window.speechSynthesis.cancel();
    </script>
</body>
</html>
